include:
  - docker-compose.yml
  
services:
  postman_test:
    build:
      context: .
      dockerfile: docker/Dockerfile.postman_test
    volumes:
      - .:/go/src/github.com/CMSgov/bcda-ssas-app
    depends_on:
      ssas:
        condition: service_healthy
  smoke_test_ssas:
    build:
      context: .
      dockerfile: docker/Dockerfile.postman_test
    volumes:
      - .:/go/src/github.com/CMSgov/bcda-ssas-app
    depends_on:
      ssas:
        condition: service_healthy
